name: CI

on:
  push:
    branches: [main, "feature/**", "fix/**"]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install backend dev deps
        working-directory: backend
        run: pip install -r requirements.txt -e ".[dev]"

      - name: Ruff lint
        working-directory: backend
        run: ruff check .

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: TypeScript type check
        working-directory: frontend
        run: npm run typecheck

  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        working-directory: backend
        run: pip install -r requirements.txt -e ".[dev]"

      - name: Run tests
        working-directory: backend
        env:
          PANDARO_ASR_BACKEND: stub
        run: pytest -q --tb=short

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  docker-build-check:
    name: Docker Build Check (no GPU)
    runs-on: ubuntu-latest
    # Only on PRs and main — full builds take a while
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push, no GPU, no HF token)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: false
          load: true
          tags: pandaro:ci-check
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Skip model preload (no HF_TOKEN in CI)
          build-args: |
            BUILDKIT_INLINE_CACHE=1

      - name: Smoke test container
        run: |
          docker run --rm -d \
            --name pandaro-ci \
            -p 9090:9090 \
            -e PANDARO_ASR_BACKEND=stub \
            -e PANDARO_OLLAMA_HOST=http://localhost:11434 \
            pandaro:ci-check
          # Wait for startup
          for i in $(seq 1 15); do
            if curl -sf http://localhost:9090/api/config >/dev/null 2>&1; then
              echo "✓ Container started successfully"
              break
            fi
            echo "Waiting for container... ($i/15)"
            sleep 2
          done
          curl -sf http://localhost:9090/api/config | python3 -m json.tool
          docker stop pandaro-ci
