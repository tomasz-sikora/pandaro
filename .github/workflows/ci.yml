name: CI

on:
  push:
    branches: [main, "feature/**", "fix/**"]
  pull_request:
    branches: [main]

jobs:
  typecheck-and-build:
    name: Type Check & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm --filter @heimdall/web lint

      - name: Build web
        run: pnpm --filter @heimdall/web build

      - name: Build proxy
        run: pnpm --filter @heimdall/proxy build

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.web
          push: false
          tags: heimdall-web:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build proxy image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.proxy
          push: false
          tags: heimdall-proxy:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
