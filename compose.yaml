# Pandaro — single-user, local, GPU. Run: `HF_TOKEN=... docker compose up --build`
# Requires NVIDIA Container Toolkit (`--gpus all`) and a host Ollama on :11434.

services:
  pandaro:
    build:
      context: .
      dockerfile: docker/Dockerfile
      secrets:
        - hf_token        # HF_TOKEN passed only at build time (not in any layer)
    image: pandaro:latest
    container_name: pandaro
    restart: unless-stopped
    ports:
      - "9090:9090"
    environment:
      # Reach the host's Ollama (LLM + embeddings) from inside the container.
      PANDARO_OLLAMA_HOST: "http://host.docker.internal:11434"
      PANDARO_PORT: "9090"
      PANDARO_LLM_MODEL: "${PANDARO_LLM_MODEL:-gemma4:31b}"
      PANDARO_LLM_MODEL_FALLBACK: "${PANDARO_LLM_MODEL_FALLBACK:-gemma3:27b}"
      PANDARO_EMBEDDING_MODEL: "${PANDARO_EMBEDDING_MODEL:-bge-m3}"
      PANDARO_DEVICE: "cuda"
      # Token also available at runtime for any lazy model download.
      HF_TOKEN: "${HF_TOKEN:-}"
      HF_HOME: "/cache/huggingface"
      HUGGINGFACE_HUB_CACHE: "/cache/huggingface/hub"
      TORCH_HOME: "/cache/torch"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      # Persistent model/package cache → models are downloaded only once.
      - pandaro-cache:/cache
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9090/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

volumes:
  pandaro-cache:

secrets:
  hf_token:
    environment: HF_TOKEN
