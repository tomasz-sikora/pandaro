server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Required for SharedArrayBuffer (WebGPU / WASM Whisper)
    add_header Cross-Origin-Embedder-Policy "require-corp" always;
    add_header Cross-Origin-Opener-Policy  "same-origin"  always;
    add_header Cross-Origin-Resource-Policy "cross-origin" always;

    # Transcription service (SSE streaming)
    location /transcribe/ {
        proxy_pass         http://transcribe:8000/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   Connection        "";
        proxy_buffering    off;
        proxy_read_timeout 7200s;
        proxy_send_timeout 7200s;
        client_max_body_size 2G;

        add_header Cross-Origin-Embedder-Policy "require-corp" always;
        add_header Cross-Origin-Opener-Policy  "same-origin"  always;
        add_header Cross-Origin-Resource-Policy "cross-origin" always;
    }

    # Proxy to LLM backend
    location /api/ {
        proxy_pass         http://proxy:3001/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Connection        "";
        proxy_buffering    off;
        proxy_read_timeout 300s;

        add_header Cross-Origin-Embedder-Policy "require-corp" always;
        add_header Cross-Origin-Opener-Policy  "same-origin"  always;
        add_header Cross-Origin-Resource-Policy "cross-origin" always;
    }

    location /health {
        proxy_pass http://proxy:3001/health;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
        add_header Cross-Origin-Opener-Policy  "same-origin"  always;
    }

    # Direct Ollama proxy (bypass app proxy)
    location /ollama/ {
        proxy_pass         http://host.docker.internal:11434/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   Connection        "";
        proxy_buffering    off;
        proxy_read_timeout 300s;

        add_header Cross-Origin-Embedder-Policy "require-corp" always;
        add_header Cross-Origin-Opener-Policy  "same-origin"  always;
        add_header Cross-Origin-Resource-Policy "cross-origin" always;
        add_header Access-Control-Allow-Origin  "*"            always;
        add_header Access-Control-Allow-Methods "GET,POST,OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type" always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # Hashed assets – cache forever
    location ~* \.(js|css|wasm|png|svg|ico|jpg|webp|ttf|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
        add_header Cross-Origin-Opener-Policy  "same-origin"  always;
        add_header Cross-Origin-Resource-Policy "cross-origin" always;
        try_files $uri =404;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
